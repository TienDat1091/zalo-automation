<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zalo Login</title>
  <link rel="stylesheet" href="assets/style_index.css" />
</head>

<body>
  <div class="box">
    <h2>🔐 Zalo Login</h2>
    <p class="subtitle">Quét mã QR để đăng nhập</p>

    <div class="qr-container">
      <img id="qr" src="/qr.png?t=0" alt="QR Code" />
    </div>

    <div class="loading">
      <div class="spinner"></div>
      <span id="statusText">Đang chờ quét mã...</span>
    </div>

    <!-- IP Display -->
    <div
      style="margin-top: 15px; font-size: 14px; color: #666; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px;">
      🌐 IP của bạn: <strong id="myIP">Đang kiểm tra...</strong>
    </div>

    <div class="status" id="statusBox" style="display: none;"></div>

    <div class="instructions">
      <strong>📱 Hướng dẫn:</strong>
      <ol>
        <li>Mở ứng dụng <strong>Zalo</strong></li>
        <li>Chọn <strong>Cài đặt</strong> → <strong>Thiết bị đã đăng nhập</strong></li>
        <li>Nhấn <strong>Đăng nhập thiết bị mới</strong></li>
        <li>Quét mã QR trên màn hình</li>
      </ol>
    </div>
  </div>

  <script src="assets/websocket-helper.js"></script>
  <script>
    const ws = createWebSocket();
    const qrImg = document.querySelector('#qr');
    const statusText = document.querySelector('#statusText');
    const statusBox = document.querySelector('#statusBox');
    const myIpEl = document.querySelector('#myIP');
    let qrRefreshInterval;

    let isAddAccount = new URLSearchParams(window.location.search).get('add_account') === 'true';
    let initialAccountCount = null;

    // Check existing accounts on load
    fetch('/api/accounts')
      .then(res => res.json())
      .then(data => {
        if (data.accounts && data.accounts.length > 0 && !isAddAccount) {
          // User already logged in, show options panel
          clearInterval(qrRefreshInterval);
          document.body.innerHTML = `
            <div class="box">
              <h2>🔐 Trạng thái Đăng nhập</h2>
              <p class="subtitle">Đã kết nối <strong>${data.accounts.length}</strong> tài khoản Zalo</p>
              
              <div style="margin: 20px 0; text-align: left; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);">
                ${data.accounts.map(acc => `
                  <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px;">
                    <img src="${acc.avatar || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\'%3E%3Cpath fill=\'%23ccc\' d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'%3E%3C/svg%3E'}" style="width:36px; height:36px; border-radius:50%; border: 1px solid rgba(0,0,0,0.1);" />
                    <div>
                      <div style="font-weight:600; font-size:14px; color:#333;">${acc.name}</div>
                      <div style="font-size:11px; color:#666;">UID: ${acc.uid}</div>
                    </div>
                  </div>
                `).join('')}
              </div>

              <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
                <button onclick="location.href='./dashboard.html'" style="background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); color:white; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; box-shadow: 0 4px 10px rgba(13,33,55,0.2);">
                  🏠 Vào Trang Quản Trị
                </button>
                ${data.accounts.length < 2 ? `
                  <button onclick="location.href='/?add_account=true'" style="background:white; color:#1e3a5f; border:1px solid #1e3a5f; padding:12px; border-radius:8px; font-weight:600; cursor:pointer;">
                    ➕ Đăng Nhập Thêm Tài Khoản 2
                  </button>
                ` : `
                  <p style="font-size:12px; color:#ef4444; font-weight:600; text-align:center;">Hệ thống đạt giới hạn tối đa 2 tài khoản.</p>
                `}
              </div>
            </div>
          `;
        }
      });

    // Xử lý khi WebSocket kết nối
    ws.onopen = () => {
      console.log('✅ Đã kết nối WebSocket');
      updateStatus('Đang chờ quét mã...', 'waiting');

      const urlParams = new URLSearchParams(window.location.search);
      const isTakeover = urlParams.get('takeover') === 'pending';

      if (isTakeover) {
        console.log('🔄 Takeover mode - requesting new QR...');
        updateStatus('🔄 Đang tạo mã QR mới...', 'waiting');
        ws.send(JSON.stringify({ type: 'request_takeover_login' }));
        window.history.replaceState({}, document.title, '/');
      } else if (isAddAccount) {
        console.log('🔌 Add account mode - requesting new login QR...');
        updateStatus('🔄 Đang tạo mã QR cho tài khoản mới...', 'waiting');
        ws.send(JSON.stringify({ type: 'add_account' }));
      }

      // Auto refresh QR mỗi 3 giây nếu chưa login
      qrRefreshInterval = setInterval(() => {
        if (document.body.dataset.logged !== 'true') {
          qrImg.src = '/qr.png?t=' + Date.now();
        }
      }, 3000);
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'qr_generating') {
        updateStatus('🔄 Đang tạo mã QR mới...', 'waiting');
      }

      if (data.type === 'login_error') {
        updateStatus('❌ ' + data.message, 'error');
      }

      // Track accounts list updates
      if (data.type === 'accounts_list') {
        if (initialAccountCount === null) {
          initialAccountCount = data.accounts.length;
        } else if (isAddAccount && data.accounts.length > initialAccountCount) {
          console.log('✅ New account added successfully!');
          document.body.dataset.logged = 'true';
          clearInterval(qrRefreshInterval);
          updateStatus('✅ Đăng nhập tài khoản mới thành công! Đang chuyển hướng...', 'success');
          setTimeout(() => {
            location.href = './dashboard.html';
          }, 1000);
        }
      }

      // If already logged in, redirect to dashboard (only if not adding a new account)
      if (data.type === 'current_user' && data.user) {
        if (isAddAccount) {
          // Ignore current_user broadcast on startup for add_account
          return;
        }

        console.log('✅ Đã đăng nhập:', data.user.name);
        document.body.dataset.logged = 'true';
        clearInterval(qrRefreshInterval);

        updateStatus('✅ Đã đăng nhập! Đang chuyển hướng...', 'success');

        // Chuyển sang dashboard ngay
        setTimeout(() => {
          const params = new URLSearchParams({
            name: data.user.name,
            uid: data.user.uid,
            avatar: data.user.avatar || ''
          });
          location.href = './dashboard.html?' + params.toString();
        }, 100);
      }
    };

    ws.onerror = (error) => {
      console.error('❌ Lỗi WebSocket:', error);
      updateStatus('Lỗi kết nối! Đang thử kết nối lại...', 'error');
    };

    ws.onclose = () => {
      console.log('⚠️ WebSocket đã đóng');
      if (document.body.dataset.logged !== 'true') {
        updateStatus('Mất kết nối! Vui lòng tải lại trang.', 'error');
        clearInterval(qrRefreshInterval);
      }
    };

    function updateStatus(message, type) {
      statusText.textContent = message;

      if (type === 'success') {
        statusBox.style.display = 'block';
        statusBox.className = 'status success';
        statusBox.textContent = message;
        document.querySelector('.loading').style.display = 'none';
      } else if (type === 'error') {
        statusBox.style.display = 'block';
        statusBox.className = 'status';
        statusBox.style.background = '#f8d7da';
        statusBox.style.color = '#721c24';
        statusBox.style.border = '1px solid #f5c6cb';
        statusBox.textContent = message;
      }
    }

    // Xử lý lỗi load ảnh QR
    qrImg.onerror = () => {
      console.log('⏳ QR chưa sẵn sàng, đang thử lại...');
      setTimeout(() => {
        qrImg.src = '/qr.png?t=' + Date.now();
      }, 1000);
    };
  </script>
</body>

</html>
